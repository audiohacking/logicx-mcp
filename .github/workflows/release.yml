name: Release

# Runs when a GitHub Release is published or updated — builds and uploads AU + .pkg assets.

on:
  release:
    types: [published, edited]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build-macos:
    name: macOS release artefacts
    runs-on: macos-14
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-14-release

      - name: Read Truce tag
        id: truce
        run: |
          tag=$(sed -n 's/.*tag = "\([^"]*\)".*/\1/p' crates/logicx-plugin/Cargo.toml | head -1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install cargo-truce
        run: |
          cargo install cargo-truce \
            --git https://github.com/truce-audio/truce \
            --tag "${{ steps.truce.outputs.tag }}" \
            --locked \
            --force

      - name: Read package version
        id: version
        run: |
          v=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          echo "pkg=$v" >> "$GITHUB_OUTPUT"

      - name: Build AU v2 + standalone and package installer
        run: |
          chmod +x scripts/build-installer-pkg.sh
          ./scripts/build-installer-pkg.sh --build --sign-plugins --version "${{ steps.version.outputs.pkg }}"

      - name: Verify release artefacts
        run: |
          ver="${{ steps.version.outputs.pkg }}"
          zip="release-artefacts/logicx-mcp-${ver}-macos-au-standalone.zip"
          pkg="release-artefacts/LogicX-MCP-macOS-Installer.pkg"
          test -f "$zip"
          test -f "$pkg"
          test -d "release-artefacts/LogicX MCP.component"
          test -d "release-artefacts/LogicX MCP.app"
          ls -lh release-artefacts/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.version.outputs.pkg }}"
          tag="${{ github.event.release.tag_name }}"
          gh release upload "$tag" \
            "release-artefacts/logicx-mcp-${ver}-macos-au-standalone.zip" \
            "release-artefacts/LogicX-MCP-macOS-Installer.pkg" \
            --clobber
